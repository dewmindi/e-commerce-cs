# ============================================================
#  Auto-Generate SEO Blog Post  |  CS Graphic Meta
# ============================================================
#
#  Schedule:  Every day at 02:00 UTC and 14:00 UTC
#             (07:30 AM and 07:30 PM Sri Lanka time)
#
#  Secrets required in GitHub → Settings → Secrets → Actions:
#    SITE_URL          → https://csgraphicmeta.com.au
#    CRON_SECRET_TOKEN → same value as CRON_SECRET_TOKEN in .env
#
#  Manual trigger: Actions → "Auto Generate Blog Post" → Run workflow
# ============================================================

name: Auto Generate Blog Post

on:
  schedule:
    #        min hour dom month dow
    - cron: "0 2,14 * * *"      # Daily at 02:00 and 14:00 UTC
  workflow_dispatch:             # Allow manual trigger from GitHub UI
    inputs:
      keyword:
        description: "Keyword to target (leave blank for auto-select)"
        required: false
        default: ""
      topic:
        description: "Topic context (leave blank to match keyword)"
        required: false
        default: ""

jobs:
  generate:
    name: Generate & Publish Blog Post
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ----------------------------------------------------------
      # Step 1: Build the request body
      # ----------------------------------------------------------
      - name: Set request payload
        id: payload
        run: |
          KEYWORD="${{ github.event.inputs.keyword }}"
          TOPIC="${{ github.event.inputs.topic }}"

          if [ -n "$KEYWORD" ]; then
            # Manual dispatch with a specific keyword
            BODY=$(printf '{"keyword":"%s","topic":"%s"}' "$KEYWORD" "${TOPIC:-$KEYWORD}")
          else
            # Cron / auto-select → empty body, cron auth picks randomly
            BODY='{}'
          fi

          echo "body=$BODY" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------
      # Step 2: Call the API
      # ----------------------------------------------------------
      - name: Trigger blog generation
        run: |
          echo "📝 Triggering blog post generation..."

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "${{ secrets.SITE_URL }}/api/generate-blog" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '${{ steps.payload.outputs.body }}' \
            --max-time 120)

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat response.json | python3 -m json.tool 2>/dev/null || cat response.json

          if [ "$HTTP_STATUS" = "201" ] || [ "$HTTP_STATUS" = "200" ]; then
            echo ""
            echo "✅ Blog post generated and published successfully!"
          elif [ "$HTTP_STATUS" = "409" ]; then
            echo ""
            echo "⚠️  Post already exists (duplicate slug/keyword) — skipped."
            exit 0
          else
            echo ""
            echo "❌ Unexpected HTTP status: $HTTP_STATUS"
            exit 1
          fi

      # ----------------------------------------------------------
      # Step 3: Cleanup old auto-generated posts
      # ----------------------------------------------------------
      - name: Cleanup old auto-generated posts
        run: |
          echo "🧹 Running cleanup for older auto-generated posts..."

          KEEP_COUNT="${{ vars.BLOG_KEEP_COUNT }}"
          if [ -z "$KEEP_COUNT" ]; then
            KEEP_COUNT="30"
          fi

          HTTP_STATUS=$(curl -s -o cleanup_response.json -w "%{http_code}" \
            -X DELETE "${{ secrets.SITE_URL }}/api/generate-blog?keep=${KEEP_COUNT}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET_TOKEN }}" \
            --max-time 120)

          echo "Cleanup HTTP Status: $HTTP_STATUS"
          echo "Cleanup Response:"
          cat cleanup_response.json | python3 -m json.tool 2>/dev/null || cat cleanup_response.json

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Cleanup completed. Keeping latest ${KEEP_COUNT} auto-generated posts."
          else
            echo "❌ Cleanup failed with HTTP status: $HTTP_STATUS"
            exit 1
          fi

      # ----------------------------------------------------------
      # Step 4: Summary
      # ----------------------------------------------------------
      - name: Job summary
        if: always()
        run: |
          echo "## Blog Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** ${{ secrets.SITE_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Keyword input:** ${{ github.event.inputs.keyword || 'auto-selected' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Blog retention (auto-generated):** ${{ vars.BLOG_KEEP_COUNT || '30' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time (UTC):** $(date -u)" >> $GITHUB_STEP_SUMMARY
